name: Feature Request
description: Suggest an idea for BooBoo
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: Thanks for suggesting an improvement.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like this to work?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What else have you considered?
