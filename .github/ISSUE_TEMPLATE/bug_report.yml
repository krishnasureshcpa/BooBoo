name: Bug Report
description: File a bug report to help BooBoo improve
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to fill out this bug report.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the bug clearly and concisely.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Run 'booboo scan'
        2. ...
        3. See error
  - type: input
    id: version
    attributes:
      label: BooBoo version
      description: Output of `booboo --version` or build info
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS version
      description: e.g., macOS 14.5
    validations:
      required: true
