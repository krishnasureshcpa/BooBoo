id: "CIS-7.6"
title: "Disable Password Autofill"
category: system_hardening
severity: medium
description: "Password autofill in Safari must be disabled."
rationale: "Disabling password autofill reduces the risk of credential theft via compromised websites."
frameworks: ["CIS"]
platforms: ["macOS 14+"]
probe: file_system
check:
    value: "0"
    op: equals
    path: "com.apple.safari AutoFillPasswords"
remediation:
    action: run_command
    command: "/usr/bin/defaults write com.apple.Safari AutoFillPasswords -bool false"
    sudo: false
    description: "Disable password autofill in Safari."
    rollbackCommand: "/usr/bin/defaults write com.apple.Safari AutoFillPasswords -bool true"
